<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="A new web page">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <title>Numbet Guessing Game</title>
</head>
<body>
  
  <div id="container">
    <div id="top">
      
      <div id="about">
        <h4>About Us</h4>
      </div>
      
      <div id="text">
        <h2>Number Guessing Game</h2>
      </div>
      
      <div id="options">
        <ul>
          <li><b>Classic</b></li>
          <li><a href="challenge.html"></a></li>
          <li><a href="multiplayer.html"></a></li>
        </ul>
      </div>
      
    </div>
    
    
    <div id="selection">
      
      <div id="range">
        <b id="rangeText"></b><br>
        <b id="difficultyText"></b>
      </div>
      
      <div id="guess">
        <center>Computer is thinking of a number...</center><br><br>
      
      <center>
        <input type="number" id="guessInput">
        <button id="guessBtn">Guess</button>
        <p id="message"></p>
        <p id="attempts"></p>
      </center>
      
      <button id="playAgainBtn" style="display:none;">Play Again</button>
<a href="index.html" id="returnBtn" style="display:none;">Return</a>
    </div>
      
      
      <div id="extra">
        <p><b>Other Games:</b></p>
        <ul>
          <li>Guess the Age</li>
          <li>Guess the Celebrity</li>
          <li>Guess the Brand</li>
        </ul>
      </div>
      
    </div>
    
    
  </div>


<script src="script.js"></script>
</body>
</html>
